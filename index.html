<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 核心：移动端全屏适配，包含安全区 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>To ty · 真心道歉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent; /* 消除移动端点击高亮 */
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            min-height: -webkit-fill-available; /* 移动端全屏高度 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        
        .container {
            position: relative;
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(12px);
            text-align: center;
            animation: fadeIn 1.5s ease-in-out;
            z-index: 5;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            color: #e91e63;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        
        .message {
            font-size: 1.2rem;
            line-height: 1.7;
            color: #2c3e50;
            margin-bottom: 40px;
            animation: slideIn 1.2s ease-out;
        }
        
        .message p {
            margin-bottom: 12px;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }
        
        .heart {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: #e91e63;
            transform: rotate(45deg);
            animation: float 6s ease-in-out infinite;
        }
        
        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: inherit;
            border-radius: 50%;
        }
        
        .heart::before {
            top: -25px;
            left: 0;
        }
        
        .heart::after {
            top: 0;
            left: -25px;
        }
        
        @keyframes float {
            0%, 100% {
                transform: rotate(45deg) translateY(0) scale(0.8);
                opacity: 0.6;
            }
            50% {
                transform: rotate(45deg) translateY(-20px) scale(1);
                opacity: 1;
            }
        }
        
        .button-container {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
            position: relative;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease;
            letter-spacing: 1px;
        }
        
        .btn-yes {
            background: linear-gradient(45deg, #e91e63, #9c27b0);
            color: white;
        }
        
        .btn-yes:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(233, 30, 99, 0.4);
        }
        
        .btn-no {
            background: #f5f5f5;
            color: #444;
            border: 1px solid #ffb6c1;
            transition: none; /* 移动端无过渡，移动更干脆 */
        }
        
        .btn-no:hover {
            background: #ffe4e9;
        }
        
        .btn:disabled {
            opacity: 0.7;
            pointer-events: none;
        }
        
        .response {
            margin-top: 32px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #e91e63;
            opacity: 0;
            transition: opacity 0.4s;
            min-height: 4rem;
        }
        
        .response.show {
            opacity: 1;
            animation: bounce 0.8s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            70% { transform: translateY(5px); }
        }
        
        /* 移动端专属适配 */
        @media (max-width: 680px) {
            .container {
                width: 92%;
                padding: 24px 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .message {
                font-size: 1rem;
            }
            .button-container {
                flex-direction: column;
                align-items: center;
                gap: 18px;
            }
            .btn {
                width: 85%;
                padding: 12px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    <div class="container">
        <h1>我想跟你说声抱歉</h1>
        <div class="message">
            <p>我反思了很久，知道自己这次做了很多让你不开心的事，想认认真真跟你道歉。</p>
            <p>接你时明明知道你东西很多、又累又辛苦，本该打车送你，却没有做到。</p>
            <p>送你们坐地铁的路上，还喋喋不休地跟你闺蜜说话，完全没顾及到你的心情。</p>
            <p>那天我状态不好，说了些矛盾的话，前后不一。</p>
            <p>我真的意识到自己的问题了，你愿意接受我的道歉吗？</p> 
        </div>
        <div class="button-container">
            <button class="btn btn-yes" id="yesBtn"> 我愿意 </button>
            <button class="btn btn-no" id="noBtn">🤔 再考虑考虑</button>
        </div>
        <div class="response" id="response"></div>
    </div>
    
    <script>
        (function() {
            "use strict";
            // 漂浮爱心
            function createHearts() {
                const heartsContainer = document.getElementById('hearts');
                if(!heartsContainer) return;
                heartsContainer.innerHTML = '';
                const colors = ['#e91e63','#f48fb1','#ce93d8','#ff80ab'];
                for(let i=0;i<15;i++){
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.style.left = Math.random()*100+'%';
                    heart.style.top = Math.random()*100+'%';
                    heart.style.animationDelay = Math.random()*6+'s';
                    heart.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                    heartsContainer.appendChild(heart);
                }
            }

            // 核心元素
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            const responseDiv = document.getElementById('response');
            
            // 移动端核心参数
            let isMoving = false;
            // 安全边距：适配手机刘海/底部横条，按钮永远在可视区
            const SAFE_AREA = 20; 

            // ========== 移动端终极修复：按钮永远在屏幕内，永不消失 ==========
            function getSafeViewport() {
                return {
                    w: window.innerWidth,
                    h: window.innerHeight
                };
            }

            // 强制按钮移动到安全位置（手机/电脑通用）
            function moveBtn() {
                if(isMoving || yesBtn.disabled) return;
                isMoving = true;

                // 首次移动：转为fixed定位，全屏逃跑
                if(noBtn.style.position !== 'fixed'){
                    const rect = noBtn.getBoundingClientRect();
                    noBtn.style.position = 'fixed';
                    noBtn.style.zIndex = 9999;
                    noBtn.style.width = rect.width + 'px';
                }

                const vp = getSafeViewport();
                const btnRect = noBtn.getBoundingClientRect();
                const btnW = btnRect.width;
                const btnH = btnRect.height;

                // 计算绝对安全范围（按钮100%可见，永不超出屏幕）
                const minX = SAFE_AREA;
                const maxX = vp.w - btnW - SAFE_AREA;
                const minY = SAFE_AREA;
                const maxY = vp.h - btnH - SAFE_AREA;

                // 生成随机安全坐标
                const x = minX + Math.random()*(maxX - minX);
                const y = minY + Math.random()*(maxY - minY);

                // 应用位置
                noBtn.style.left = x + 'px';
                noBtn.style.top = y + 'px';

                isMoving = false;
            }

            // ========== 移动端触摸/PC鼠标 统一触发逃跑 ==========
            function triggerMove(e){
                e.preventDefault(); // 移动端禁止默认行为
                moveBtn();
            }

            // ========== 屏幕旋转/resize 强制拉回按钮 ==========
            function handleResize(){
                if(noBtn.style.position === 'fixed' && !yesBtn.disabled){
                    moveBtn();
                }
            }

            // ========== 按钮事件 ==========
            // 拒绝按钮：触摸/鼠标悬浮都逃跑
            noBtn.addEventListener('touchstart', triggerMove);
            noBtn.addEventListener('mouseenter', triggerMove);
            noBtn.addEventListener('click', (e)=>{
                e.preventDefault();
                responseDiv.textContent = '好吧...我理解你，我会继续努力！';
                responseDiv.className = 'response show';
            });

            // 接受按钮
            yesBtn.addEventListener('click', ()=>{
                responseDiv.textContent = '太好了！让我们开一场三角洲吧！';
                responseDiv.className = 'response show';
                createHearts();
                // 禁用按钮，停止逃跑
                yesBtn.disabled = true;
                noBtn.disabled = true;
                noBtn.style.opacity = 0.6;
            });

            // 监听屏幕旋转/大小变化
            window.addEventListener('resize', handleResize);
            window.addEventListener('orientationchange', ()=>{
                setTimeout(handleResize, 100);
            });

            // 初始化
            createHearts();
        })();
    </script>
</body>
</html>
