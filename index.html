<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>To ty · 真心道歉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免移动端长按菜单，不影响体验 */
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            touch-action: pan-x pan-y; /* 保留手势滚动但按钮区域会阻止冒泡 */
        }
        
        .container {
            position: relative;
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(12px);
            text-align: center;
            animation: fadeIn 1.5s ease-in-out;
            z-index: 5;
            pointer-events: auto;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            color: #e91e63;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        
        .message {
            font-size: 1.2rem;
            line-height: 1.7;
            color: #2c3e50;
            margin-bottom: 40px;
            animation: slideIn 1.2s ease-out;
        }
        
        .message p {
            margin-bottom: 12px;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }
        
        .heart {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: #e91e63;
            transform: rotate(45deg);
            animation: float 6s ease-in-out infinite;
        }
        
        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: inherit;
            border-radius: 50%;
        }
        
        .heart::before {
            top: -25px;
            left: 0;
        }
        
        .heart::after {
            top: 0;
            left: -25px;
        }
        
        @keyframes float {
            0%, 100% {
                transform: rotate(45deg) translateY(0) scale(0.8);
                opacity: 0.6;
            }
            50% {
                transform: rotate(45deg) translateY(-20px) scale(1);
                opacity: 1;
            }
        }
        
        .button-container {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
            position: relative;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s;
            will-change: transform;
            letter-spacing: 1px;
        }
        
        .btn-yes {
            background: linear-gradient(45deg, #e91e63, #9c27b0);
            color: white;
            border: none;
        }
        
        .btn-yes:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(233, 30, 99, 0.4);
        }
        
        /* “再考虑考虑” 按钮基础样式，移动时由JS动态控制fixed + 位置 */
        .btn-no {
            background: #f5f5f5;
            color: #444;
            border: 1px solid #ffb6c1;
            transition: background 0.2s, box-shadow 0.2s, left 0.05s linear, top 0.05s linear;
            /* 极短过渡让移动干脆利落不拖影，且不会消失 */
        }
        
        .btn-no:hover {
            background: #ffe4e9;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transform: scale(0.98);
        }
        
        .btn:disabled {
            opacity: 0.7;
            cursor: default;
            transform: none !important;
            filter: grayscale(0.05);
            pointer-events: none;
        }
        
        .response {
            margin-top: 32px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #e91e63;
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            min-height: 4rem;
            text-shadow: 0 2px 5px rgba(255,255,255,0.5);
        }
        
        .response.show {
            opacity: 1;
            animation: bounce 0.8s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            70% { transform: translateY(5px); }
        }
        
        /* 移动端适配 */
        @media (max-width: 680px) {
            .container {
                width: 92%;
                padding: 24px 20px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .message {
                font-size: 1rem;
            }
            
            .button-container {
                flex-direction: column;
                align-items: center;
                gap: 18px;
            }
            
            .btn {
                width: 85%;
                padding: 12px 20px;
                font-size: 1rem;
            }
        }
        
        /* 防止fixed按钮在极端尺寸下闪烁 */
        .btn-no-fixed {
            position: fixed !important;
            margin: 0 !important;
            z-index: 1000;
            transition: left 0.05s linear, top 0.05s linear; /* 极速移动无残影 */
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    <div class="container">
        <h1>我想跟你说声抱歉</h1>
        <div class="message">
            <p>我反思了很久，知道自己这次做了很多让你不开心的事，想认认真真跟你道歉。</p>
            <p>接你时明明知道你东西很多、又累又辛苦，本该打车送你，却没有做到。</p>
            <p>送你们坐地铁的路上，还喋喋不休地跟你闺蜜说话，完全没顾及到你的心情。</p>
            <p>那天我状态不好，说了些矛盾的话，前后不一。</p>
            <p>我真的意识到自己的问题了，你愿意接受我的道歉吗？</p> 
        </div>
        <div class="button-container">
            <button class="btn btn-yes" id="yesBtn"> 我愿意 </button>
            <button class="btn btn-no" id="noBtn">🤔 再考虑考虑</button>
        </div>
        <div class="response" id="response"></div>
    </div>
    
    <script>
        (function() {
            "use strict";
            
            // ---------- 漂浮爱心（加强版）----------
            function createHearts() {
                const heartsContainer = document.getElementById('hearts');
                if (!heartsContainer) return;
                // 清除旧心，避免过多
                const oldHearts = heartsContainer.querySelectorAll('.heart');
                oldHearts.forEach(h => h.remove());
                
                const colors = ['#e91e63', '#f48fb1', '#ce93d8', '#ff80ab', '#f06292'];
                const heartCount = Math.min(20, window.innerWidth / 40);
                for (let i = 0; i < heartCount; i++) {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.top = Math.random() * 100 + '%';
                    heart.style.animationDelay = Math.random() * 8 + 's';
                    heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                    heart.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    heart.style.opacity = Math.random() * 0.6 + 0.3;
                    heart.style.transform = `rotate(45deg) scale(${Math.random() * 0.6 + 0.5})`;
                    heartsContainer.appendChild(heart);
                }
            }
            
            // 全局元素
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            const responseDiv = document.getElementById('response');
            
            // 逃跑按钮的固定状态标记
            let isNoBtnFixed = false;
            let isMoving = false;          // 防止并发移动
            let pendingMoveTimer = null;
            const EDGE_SAFE_DISTANCE = 16;   // 距离屏幕边缘最小距离(px) 确保完全可见
            
            // ---------- 辅助函数：获取精确视口尺寸（考虑任何滚动条，移动端安全）----------
            function getViewportSize() {
                return {
                    width: window.innerWidth,
                    height: window.innerHeight
                };
            }
            
            // ---------- 确保按钮永远不超出屏幕边界 (修正核心) ----------
            function clampButtonToViewport() {
                if (!noBtn) return;
                // 只有 fixed 定位的按钮需要边界修正，普通static不用管
                if (noBtn.style.position !== 'fixed') return;
                
                const rect = noBtn.getBoundingClientRect();
                const btnW = rect.width;
                const btnH = rect.height;
                const { width: vw, height: vh } = getViewportSize();
                
                // 极端情况：如果按钮宽度或者高度大于视口，我们至少保证左上角不超出左/上边缘
                let currentLeft = parseFloat(noBtn.style.left);
                let currentTop = parseFloat(noBtn.style.top);
                if (isNaN(currentLeft)) currentLeft = rect.left;
                if (isNaN(currentTop)) currentTop = rect.top;
                
                // 计算合法区间 (保证整个按钮都在屏幕内部，不能消失)
                const minX = EDGE_SAFE_DISTANCE;
                const maxX = vw - btnW - EDGE_SAFE_DISTANCE;
                const minY = EDGE_SAFE_DISTANCE;
                const maxY = vh - btnH - EDGE_SAFE_DISTANCE;
                
                let newLeft = currentLeft;
                let newTop = currentTop;
                
                // 当视口过小无法容纳完整按钮时，至少让按钮紧贴边缘但完整显示（缩小边距保证不溢出）
                if (maxX < minX) {
                    // 窗口太窄，按钮宽度几乎和屏幕一样，让左边缘贴近最小边距，右边缘会超出但至少不会消失
                    newLeft = EDGE_SAFE_DISTANCE;
                } else {
                    newLeft = Math.min(maxX, Math.max(minX, currentLeft));
                }
                
                if (maxY < minY) {
                    newTop = EDGE_SAFE_DISTANCE;
                } else {
                    newTop = Math.min(maxY, Math.max(minY, currentTop));
                }
                
                // 如果位置需要修正，直接应用
                if (Math.abs(newLeft - currentLeft) > 0.5 || Math.abs(newTop - currentTop) > 0.5) {
                    noBtn.style.left = newLeft + 'px';
                    noBtn.style.top = newTop + 'px';
                }
                
                // 二次保障：如果按钮依然有任何部分超出视口，强制重新设置到一个绝对安全的位置（左上安全区）
                const afterRect = noBtn.getBoundingClientRect();
                if (afterRect.right > vw + 2 || afterRect.left < -2 || afterRect.bottom > vh + 2 || afterRect.top < -2) {
                    // 灾难恢复：放到屏幕中间偏右下的安全区域
                    const fallbackX = Math.min(maxX, Math.max(minX, vw / 2 - btnW / 2));
                    const fallbackY = Math.min(maxY, Math.max(minY, vh / 2 - btnH / 2));
                    noBtn.style.left = (isNaN(fallbackX) ? EDGE_SAFE_DISTANCE : fallbackX) + 'px';
                    noBtn.style.top = (isNaN(fallbackY) ? EDGE_SAFE_DISTANCE : fallbackY) + 'px';
                }
            }
            
            // ---------- 将按钮转为 fixed 并初始化安全位置（第一次逃跑时）----------
            function ensureNoBtnFixed() {
                if (yesBtn.disabled) return false;   // 已经原谅了，无需移动
                if (noBtn.style.position === 'fixed') return true;
                
                // 获取当前相对于视口的位置
                const rect = noBtn.getBoundingClientRect();
                const btnW = rect.width;
                const btnH = rect.height;
                const { width: vw, height: vh } = getViewportSize();
                
                // 设定最小边距
                const minX = EDGE_SAFE_DISTANCE;
                const maxX = vw - btnW - EDGE_SAFE_DISTANCE;
                const minY = EDGE_SAFE_DISTANCE;
                const maxY = vh - btnH - EDGE_SAFE_DISTANCE;
                
                let startX = rect.left;
                let startY = rect.top;
                // 确保初始位置在边界内
                if (maxX < minX) {
                    startX = EDGE_SAFE_DISTANCE;
                } else {
                    startX = Math.min(maxX, Math.max(minX, startX));
                }
                if (maxY < minY) {
                    startY = EDGE_SAFE_DISTANCE;
                } else {
                    startY = Math.min(maxY, Math.max(minY, startY));
                }
                
                noBtn.style.position = 'fixed';
                noBtn.style.left = startX + 'px';
                noBtn.style.top = startY + 'px';
                noBtn.style.width = rect.width + 'px';
                noBtn.style.zIndex = '9999';
                noBtn.style.transition = 'left 0.05s linear, top 0.05s linear'; // 极快移动，无残影
                isNoBtnFixed = true;
                return true;
            }
            
            // ---------- 智能移动：确保新位置既在边界内，又尽量避开鼠标/手指，永不超出屏幕 ----------
            function moveButtonToRandomSafePosition(mouseX, mouseY) {
                if (isMoving) return false;
                if (yesBtn.disabled) return false;
                
                // 确保 fixed 模式
                const isFixedReady = ensureNoBtnFixed();
                if (!isFixedReady && yesBtn.disabled) return false;
                
                isMoving = true;
                
                try {
                    const rect = noBtn.getBoundingClientRect();
                    const btnW = rect.width;
                    const btnH = rect.height;
                    const { width: vw, height: vh } = getViewportSize();
                    
                    // 动态边界（保证完全可见，不留死角）
                    const minX = EDGE_SAFE_DISTANCE;
                    const maxX = vw - btnW - EDGE_SAFE_DISTANCE;
                    const minY = EDGE_SAFE_DISTANCE;
                    const maxY = vh - btnH - EDGE_SAFE_DISTANCE;
                    
                    // 极端情况防御：如果视口实在放不下按钮（超小屏），则不移动但确保不消失，直接修正
                    if (maxX < minX || maxY < minY) {
                        // 无法安全移动，强行固定到边缘即可
                        clampButtonToViewport();
                        isMoving = false;
                        return false;
                    }
                    
                    // 最多尝试15次找到一个不遮盖鼠标的位置
                    let attempts = 0;
                    const MAX_ATTEMPTS = 18;
                    let newLeft = null, newTop = null;
                    
                    while (attempts < MAX_ATTEMPTS) {
                        const randX = minX + Math.random() * (maxX - minX);
                        const randY = minY + Math.random() * (maxY - minY);
                        
                        // 检查鼠标（或触摸点）是否在这个候选区域内
                        const isOverMouse = (mouseX !== undefined && mouseX !== null) && 
                                            (mouseX >= randX && mouseX <= randX + btnW && 
                                             mouseY >= randY && mouseY <= randY + btnH);
                        
                        if (!isOverMouse) {
                            newLeft = randX;
                            newTop = randY;
                            break;
                        }
                        attempts++;
                    }
                    
                    // 如果没找到理想位置，至少保证随机位置（可能会在鼠标下，但至少不超出）
                    if (newLeft === null) {
                        newLeft = minX + Math.random() * (maxX - minX);
                        newTop = minY + Math.random() * (maxY - minY);
                    }
                    
                    // 二次边界保险（浮点数取整避免漂移）
                    newLeft = Math.min(maxX, Math.max(minX, newLeft));
                    newTop = Math.min(maxY, Math.max(minY, newTop));
                    
                    // 应用新位置
                    noBtn.style.left = newLeft + 'px';
                    noBtn.style.top = newTop + 'px';
                    
                    // 再次确认按钮在视口内（异步延迟确保DOM更新后检查）
                    requestAnimationFrame(() => {
                        if (!yesBtn.disabled) {
                            clampButtonToViewport();
                        }
                        isMoving = false;
                    });
                    
                    return true;
                } catch (err) {
                    console.warn("move error", err);
                    clampButtonToViewport();
                    isMoving = false;
                    return false;
                }
            }
            
            // ---------- 鼠标/触摸触发逃跑 (优雅处理事件) ----------
            function handleEscapeTrigger(clientX, clientY) {
                if (yesBtn.disabled) return;
                if (isMoving) return;
                
                // 确保fixed状态
                ensureNoBtnFixed();
                
                // 关键: 直接基于传入的鼠标/触摸坐标进行移动
                moveButtonToRandomSafePosition(clientX, clientY);
            }
            
            // ---------- 鼠标进入 或 触摸开始 触发逃跑 ----------
            function onNoBtnMouseEnter(e) {
                if (yesBtn.disabled) return;
                e.preventDefault();
                let clientX, clientY;
                if (e.touches) {
                    // 触摸事件
                    const touch = e.touches[0];
                    if (touch) {
                        clientX = touch.clientX;
                        clientY = touch.clientY;
                    } else return;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                if (clientX !== undefined && clientY !== undefined) {
                    handleEscapeTrigger(clientX, clientY);
                }
            }
            
            // 对于移动端，额外监听 touchstart 并阻止冒泡防止页面滚动时误触
            function onNoBtnTouchStart(e) {
                if (yesBtn.disabled) return;
                e.preventDefault();      // 防止页面滚动，让按钮逃跑更灵敏
                const touch = e.touches[0];
                if (touch) {
                    handleEscapeTrigger(touch.clientX, touch.clientY);
                }
            }
            
            // 窗口resize时确保按钮永不离界
            function onWindowResize() {
                if (yesBtn.disabled) return;
                if (noBtn.style.position === 'fixed') {
                    clampButtonToViewport();
                    // 额外检查按钮是否因为视口变化而“消失”，确保可见
                    requestAnimationFrame(() => {
                        const rect = noBtn.getBoundingClientRect();
                        const { width: vw, height: vh } = getViewportSize();
                        if (rect.right < 5 || rect.left > vw - 5 || rect.bottom < 5 || rect.top > vh - 5) {
                            // 消失了！立刻重置到安全坐标
                            const btnW = rect.width;
                            const btnH = rect.height;
                            const minX = EDGE_SAFE_DISTANCE;
                            const maxX = vw - btnW - EDGE_SAFE_DISTANCE;
                            const minY = EDGE_SAFE_DISTANCE;
                            const maxY = vh - btnH - EDGE_SAFE_DISTANCE;
                            let fallbackX = minX;
                            let fallbackY = minY;
                            if (maxX > minX) fallbackX = minX + (maxX - minX) / 2;
                            if (maxY > minY) fallbackY = minY + (maxY - minY) / 2;
                            noBtn.style.left = fallbackX + 'px';
                            noBtn.style.top = fallbackY + 'px';
                        }
                    });
                }
            }
            
            // ---------- 点击“再考虑考虑” 时显示可爱反馈，但不消失并且继续逃跑（不禁用按钮）----------
            function onNoBtnClick(e) {
                if (yesBtn.disabled) return;
                e.stopPropagation();
                // 温柔的文字反馈，让道歉更有爱
                responseDiv.textContent = '好吧...我理解你的感受，我会继续努力！';
                responseDiv.className = 'response show';
                setTimeout(() => {
                    if (responseDiv.className.includes('show') && !yesBtn.disabled) {
                        // 三秒后淡去，但不要覆盖接受消息
                        if (responseDiv.textContent.includes('耐心等你')) {
                            responseDiv.classList.remove('show');
                        }
                    }
                }, 2200);
                
                // 即使点击了，也让它再逃跑一次，保持调皮但是不会消失
                if (!isMoving) {
                    // 获取当前鼠标位置，如果没有真实鼠标事件则根据按钮中心偏移模拟？
                    // 让按钮再随机逃跑一次增加趣味
                    const rect = noBtn.getBoundingClientRect();
                    const fakeX = rect.left + rect.width / 2;
                    const fakeY = rect.top + rect.height / 2;
                    handleEscapeTrigger(fakeX, fakeY);
                }
            }
            
            // ---------- 愿意接受道歉的逻辑 ----------
            function onYesClick() {
                if (yesBtn.disabled) return;
                
                responseDiv.textContent = '太好了！让我们开一场三角洲吧！';
                responseDiv.className = 'response show';
                
                // 额外生成爱心雨
                createHearts();
                for(let i = 0; i < 8; i++) {
                    setTimeout(() => createHearts(), i * 200);
                }
                
                // 禁用两个按钮，不再逃跑
                yesBtn.disabled = true;
                noBtn.disabled = true;
                
                // 将“再考虑考虑”按钮变灰且静止，不再响应任何事件
                noBtn.style.pointerEvents = 'none';
                noBtn.style.opacity = '0.7';
                noBtn.style.transition = 'opacity 0.3s';
                // 可选：把按钮变柔和
                noBtn.style.filter = 'grayscale(0.1)';
                
                // 确保回应不会消失
                setTimeout(() => {
                    // 保持回应内容
                }, 100);
            }
            
            // ---------- 初始化事件监听与保险 ----------
            function init() {
                createHearts();
                
                // 逃跑核心: mouseenter (pc) + touchstart (移动端)
                noBtn.addEventListener('mouseenter', onNoBtnMouseEnter);
                noBtn.addEventListener('touchstart', onNoBtnTouchStart, { passive: false });
                // 点击也轻微逃跑+反馈
                noBtn.addEventListener('click', onNoBtnClick);
                
                // yes 按钮
                yesBtn.addEventListener('click', onYesClick);
                
                // 全局resize保险（保证按钮永远不消失）
                window.addEventListener('resize', onWindowResize);
                window.addEventListener('orientationchange', () => {
                    setTimeout(onWindowResize, 30);
                });
                
                // 滚动保险（如果有滚动，确保fixed按钮不偏）
                window.addEventListener('scroll', () => {
                    if (noBtn.style.position === 'fixed' && !yesBtn.disabled) {
                        clampButtonToViewport();
                    }
                });
                
                // 初次也执行一次边界清理
                setTimeout(() => {
                    if (noBtn.style.position === 'fixed') clampButtonToViewport();
                }, 100);
                
                // 动态监听按钮尺寸变化（比如字体缩放），每2秒做一次温和保险（不影响性能）
                setInterval(() => {
                    if (!yesBtn.disabled && noBtn.style.position === 'fixed') {
                        clampButtonToViewport();
                    }
                }, 1500);
            }
            
            init();
        })();
    </script>
</body>
</html>
