<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To ty</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .container {
            position: relative;
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            text-align: center;
            animation: fadeIn 1.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            color: #e91e63;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .message {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #333;
            margin-bottom: 40px;
            animation: slideIn 2s ease-in-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .heart {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: #e91e63;
            transform: rotate(45deg);
            animation: float 6s ease-in-out infinite;
        }
        
        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: #e91e63;
            border-radius: 50%;
        }
        
        .heart::before {
            top: -25px;
            left: 0;
        }
        
        .heart::after {
            top: 0;
            left: -25px;
        }
        
        @keyframes float {
            0%, 100% {
                transform: rotate(45deg) translateY(0) scale(0.8);
                opacity: 0.7;
            }
            50% {
                transform: rotate(45deg) translateY(-20px) scale(1);
                opacity: 1;
            }
        }
        
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            position: relative;
        }
        
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .btn-yes {
            background: linear-gradient(45deg, #e91e63, #9c27b0);
            color: white;
        }
        
        .btn-yes:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(233, 30, 99, 0.4);
        }
        
        .btn-no {
            background: #f1f1f1;
            color: #333;
            position: relative;
            transition: all 0.05s ease;
        }
        
        .btn-no:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        
        .response {
            margin-top: 30px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #e91e63;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .response.show {
            opacity: 1;
            animation: bounce 1s ease-in-out;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
        
        @media (max-width: 768px) {
            .container {
                width: 95%;
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .message {
                font-size: 1rem;
            }
            
            .button-container {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 80%;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    <div class="container">
       <h1>我想跟你说声抱歉</h1>
        <div class="message">
            <p>我反思了很久，知道自己这次做了很多让你不开心的事，想认认真真跟你道歉。</p>
            <p>接你时明明知道你东西很多、又累又辛苦，本该打车送你，却没有做到。</p>
            <p>送你们坐地铁的路上，还喋喋不休地跟你闺蜜说话，完全没顾及到你的心情。</p>
            <p>那天我状态不好，说了些矛盾的话，前后不一。</p>
            <p>我真的意识到自己的问题了，你愿意接受我的道歉吗？</p> 
        </div>
        <div class="button-container">
            <button class="btn btn-yes" id="yesBtn">我愿意</button>
            <button class="btn btn-no" id="noBtn">再考虑考虑</button>
        </div>
        <div class="response" id="response"></div>
    </div>
    
    <script>
        // 创建漂浮的心形
        function createHearts() {
            const heartsContainer = document.getElementById('hearts');
            const colors = ['#e91e63', '#f48fb1', '#ce93d8', '#ba68c8'];
            
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 6 + 's';
                heart.style.animationDuration = (Math.random() * 4 + 4) + 's';
                heart.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                heart.style.opacity = Math.random() * 0.5 + 0.3;
                heart.style.transform = 'rotate(45deg) scale(' + (Math.random() * 0.5 + 0.5) + ')';
                heartsContainer.appendChild(heart);
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            createHearts();
            
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            const response = document.getElementById('response');
            
            yesBtn.addEventListener('click', function() {
                response.textContent = '太好了！让我们开一场三角洲吧！';
                response.className = 'response show';
                
                // 增加更多的心形
                createHearts();
                
                // 禁用按钮
                yesBtn.disabled = true;
                noBtn.disabled = true;
            });
            
            noBtn.addEventListener('mouseover', function() {
                // 让"再考虑考虑"按钮移动，但不超出主容器范围
                const container = document.querySelector('.container');
                const containerRect = container.getBoundingClientRect();
                
                // 获取按钮尺寸
                const tempRect = noBtn.getBoundingClientRect();
                const buttonWidth = tempRect.width;
                const buttonHeight = tempRect.height;
                
                // 确保按钮完全在主容器内，留一些边距
                const margin = 20;
                const maxX = container.offsetWidth - buttonWidth - margin * 2;
                const maxY = container.offsetHeight - buttonHeight - margin * 2;
                
                // 确保不会超出范围
                if (maxX > 0 && maxY > 0) {
                    const newX = margin + Math.random() * maxX;
                    const newY = margin + Math.random() * maxY;
                    
                    noBtn.style.position = 'absolute';
                    noBtn.style.left = newX + 'px';
                    noBtn.style.top = newY + 'px';
                    noBtn.style.zIndex = '10';
                }
            });
            
            noBtn.addEventListener('click', function() {
                response.textContent = '没关系，我理解你！';
                response.className = 'response show';
            });
        });
    </script>
</body>
</html>
