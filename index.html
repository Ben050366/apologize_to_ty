<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>To ty · 真心道歉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免移动端长按菜单 */
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            touch-action: pan-x pan-y;
        }
        
        .container {
            position: relative;
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(12px);
            text-align: center;
            animation: fadeIn 1.5s ease-in-out;
            z-index: 5;
            pointer-events: auto;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            color: #e91e63;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        
        .message {
            font-size: 1.2rem;
            line-height: 1.7;
            color: #2c3e50;
            margin-bottom: 40px;
            animation: slideIn 1.2s ease-out;
        }
        
        .message p {
            margin-bottom: 12px;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }
        
        .heart {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: #e91e63;
            transform: rotate(45deg);
            animation: float 6s ease-in-out infinite;
        }
        
        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: inherit;
            border-radius: 50%;
        }
        
        .heart::before {
            top: -25px;
            left: 0;
        }
        
        .heart::after {
            top: 0;
            left: -25px;
        }
        
        @keyframes float {
            0%, 100% {
                transform: rotate(45deg) translateY(0) scale(0.8);
                opacity: 0.6;
            }
            50% {
                transform: rotate(45deg) translateY(-20px) scale(1);
                opacity: 1;
            }
        }
        
        .button-container {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
            position: relative;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s;
            will-change: transform;
            letter-spacing: 1px;
        }
        
        .btn-yes {
            background: linear-gradient(45deg, #e91e63, #9c27b0);
            color: white;
            border: none;
        }
        
        .btn-yes:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(233, 30, 99, 0.4);
        }
        
        .btn-no {
            background: #f5f5f5;
            color: #444;
            border: 1px solid #ffb6c1;
            transition: background 0.2s, box-shadow 0.2s, left 0.05s linear, top 0.05s linear;
        }
        
        .btn-no:hover {
            background: #ffe4e9;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transform: scale(0.98);
        }
        
        .btn:disabled {
            opacity: 0.7;
            cursor: default;
            transform: none !important;
            filter: grayscale(0.05);
            pointer-events: none;
        }
        
        .response {
            margin-top: 32px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #e91e63;
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            min-height: 4rem;
            text-shadow: 0 2px 5px rgba(255,255,255,0.5);
        }
        
        .response.show {
            opacity: 1;
            animation: bounce 0.8s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            70% { transform: translateY(5px); }
        }
        
        /* 移动端适配 */
        @media (max-width: 680px) {
            .container {
                width: 92%;
                padding: 24px 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .message {
                font-size: 1rem;
            }
            .button-container {
                flex-direction: column;
                align-items: center;
                gap: 18px;
            }
            .btn {
                width: 85%;
                padding: 12px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    <div class="container">
        <h1>我想跟你说声抱歉</h1>
        <div class="message">
            <p>我反思了很久，知道自己这次做了很多让你不开心的事，想认认真真跟你道歉。</p>
            <p>接你时明明知道你东西很多、又累又辛苦，本该打车送你，却没有做到。</p>
            <p>送你们坐地铁的路上，还喋喋不休地跟你闺蜜说话，完全没顾及到你的心情。</p>
            <p>那天我状态不好，说了些矛盾的话，前后不一。</p>
            <p>我真的意识到自己的问题了，你愿意接受我的道歉吗？</p> 
        </div>
        <div class="button-container">
            <button class="btn btn-yes" id="yesBtn"> 我愿意 </button>
            <button class="btn btn-no" id="noBtn">🤔 再考虑考虑</button>
        </div>
        <div class="response" id="response"></div>
    </div>
    
    <script>
        (function() {
            "use strict";
            
            // 漂浮爱心（加强移动端性能）
            function createHearts() {
                const heartsContainer = document.getElementById('hearts');
                if (!heartsContainer) return;
                const oldHearts = heartsContainer.querySelectorAll('.heart');
                oldHearts.forEach(h => h.remove());
                
                const colors = ['#e91e63', '#f48fb1', '#ce93d8', '#ff80ab', '#f06292'];
                const heartCount = Math.min(20, window.innerWidth / 40);
                for (let i = 0; i < heartCount; i++) {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.top = Math.random() * 100 + '%';
                    heart.style.animationDelay = Math.random() * 8 + 's';
                    heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                    heart.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    heart.style.opacity = Math.random() * 0.6 + 0.3;
                    heart.style.transform = `rotate(45deg) scale(${Math.random() * 0.6 + 0.5})`;
                    heartsContainer.appendChild(heart);
                }
            }
            
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            const responseDiv = document.getElementById('response');
            
            let isMoving = false;
            const EDGE_SAFE_DISTANCE = 15;   // 距离屏幕边缘至少15px
            
            // 获取最准确的视口尺寸（移动端避免地址栏影响，使用document.documentElement）
            function getViewportSize() {
                return {
                    width: window.innerWidth,
                    height: window.innerHeight
                };
            }
            
            // 强制修正按钮位置，确保完整在视口内（核心修复）
            function enforceButtonInViewport() {
                if (!noBtn) return;
                if (noBtn.style.position !== 'fixed') return;
                
                const rect = noBtn.getBoundingClientRect();
                const btnW = rect.width;
                const btnH = rect.height;
                const { width: vw, height: vh } = getViewportSize();
                
                // 边界计算（允许的最小/最大 left/top）
                let minLeft = EDGE_SAFE_DISTANCE;
                let maxLeft = vw - btnW - EDGE_SAFE_DISTANCE;
                let minTop = EDGE_SAFE_DISTANCE;
                let maxTop = vh - btnH - EDGE_SAFE_DISTANCE;
                
                // 极端情况：按钮宽度大于视口宽度时，至少保证左边缘不超出左边距
                if (maxLeft < minLeft) {
                    minLeft = 0;
                    maxLeft = vw - btnW;
                }
                if (maxTop < minTop) {
                    minTop = 0;
                    maxTop = vh - btnH;
                }
                
                let currentLeft = parseFloat(noBtn.style.left);
                let currentTop = parseFloat(noBtn.style.top);
                if (isNaN(currentLeft)) currentLeft = rect.left;
                if (isNaN(currentTop)) currentTop = rect.top;
                
                let newLeft = Math.min(maxLeft, Math.max(minLeft, currentLeft));
                let newTop = Math.min(maxTop, Math.max(minTop, currentTop));
                
                // 如果超出边界则修正
                if (newLeft !== currentLeft || newTop !== currentTop) {
                    noBtn.style.left = newLeft + 'px';
                    noBtn.style.top = newTop + 'px';
                }
                
                // 二次安全校验：如果按钮任何部分超出视口超过2px，强制放到安全区域中心
                const afterRect = noBtn.getBoundingClientRect();
                if (afterRect.right > vw + 2 || afterRect.left < -2 || afterRect.bottom > vh + 2 || afterRect.top < -2) {
                    const safeX = Math.min(maxLeft, Math.max(minLeft, vw/2 - btnW/2));
                    const safeY = Math.min(maxTop, Math.max(minTop, vh/2 - btnH/2));
                    noBtn.style.left = safeX + 'px';
                    noBtn.style.top = safeY + 'px';
                }
            }
            
            // 将按钮转为fixed定位，并保证初始位置安全
            function ensureFixedAndSafe() {
                if (yesBtn.disabled) return false;
                if (noBtn.style.position === 'fixed') {
                    enforceButtonInViewport();
                    return true;
                }
                
                const rect = noBtn.getBoundingClientRect();
                const btnW = rect.width;
                const btnH = rect.height;
                const { width: vw, height: vh } = getViewportSize();
                
                let minLeft = EDGE_SAFE_DISTANCE;
                let maxLeft = vw - btnW - EDGE_SAFE_DISTANCE;
                let minTop = EDGE_SAFE_DISTANCE;
                let maxTop = vh - btnH - EDGE_SAFE_DISTANCE;
                
                if (maxLeft < minLeft) {
                    minLeft = 0;
                    maxLeft = vw - btnW;
                }
                if (maxTop < minTop) {
                    minTop = 0;
                    maxTop = vh - btnH;
                }
                
                let startX = Math.min(maxLeft, Math.max(minLeft, rect.left));
                let startY = Math.min(maxTop, Math.max(minTop, rect.top));
                
                noBtn.style.position = 'fixed';
                noBtn.style.left = startX + 'px';
                noBtn.style.top = startY + 'px';
                noBtn.style.width = rect.width + 'px';
                noBtn.style.zIndex = '9999';
                noBtn.style.transition = 'left 0.08s linear, top 0.08s linear';
                return true;
            }
            
            // 移动按钮到安全随机位置，避开触摸点（鼠标/手指）
            function moveToRandomSafePosition(touchX, touchY) {
                if (isMoving) return false;
                if (yesBtn.disabled) return false;
                
                const ready = ensureFixedAndSafe();
                if (!ready) return false;
                
                isMoving = true;
                
                try {
                    const rect = noBtn.getBoundingClientRect();
                    const btnW = rect.width;
                    const btnH = rect.height;
                    const { width: vw, height: vh } = getViewportSize();
                    
                    let minX = EDGE_SAFE_DISTANCE;
                    let maxX = vw - btnW - EDGE_SAFE_DISTANCE;
                    let minY = EDGE_SAFE_DISTANCE;
                    let maxY = vh - btnH - EDGE_SAFE_DISTANCE;
                    
                    // 边界容错（极端小屏幕）
                    if (maxX < minX) { minX = 0; maxX = vw - btnW; }
                    if (maxY < minY) { minY = 0; maxY = vh - btnH; }
                    
                    // 如果可移动范围过小，直接强制修正后返回
                    if (maxX - minX < 5 || maxY - minY < 5) {
                        enforceButtonInViewport();
                        isMoving = false;
                        return false;
                    }
                    
                    let attempts = 0;
                    const MAX_ATTEMPTS = 20;
                    let newLeft = null, newTop = null;
                    
                    while (attempts < MAX_ATTEMPTS) {
                        const randX = minX + Math.random() * (maxX - minX);
                        const randY = minY + Math.random() * (maxY - minY);
                        
                        // 检查触摸点是否落在候选区域内
                        const touchInside = (touchX !== undefined && touchX !== null) &&
                                            (touchX >= randX && touchX <= randX + btnW &&
                                             touchY >= randY && touchY <= randY + btnH);
                        
                        if (!touchInside) {
                            newLeft = randX;
                            newTop = randY;
                            break;
                        }
                        attempts++;
                    }
                    
                    if (newLeft === null) {
                        newLeft = minX + Math.random() * (maxX - minX);
                        newTop = minY + Math.random() * (maxY - minY);
                    }
                    
                    // 最终边界裁剪
                    newLeft = Math.min(maxX, Math.max(minX, newLeft));
                    newTop = Math.min(maxY, Math.max(minY, newTop));
                    
                    noBtn.style.left = newLeft + 'px';
                    noBtn.style.top = newTop + 'px';
                    
                    // 立即再次检查边界（防止怪异偏移）
                    requestAnimationFrame(() => {
                        enforceButtonInViewport();
                        isMoving = false;
                    });
                    
                    return true;
                } catch (err) {
                    console.warn(err);
                    enforceButtonInViewport();
                    isMoving = false;
                    return false;
                }
            }
            
            // 处理触摸或鼠标进入
            function handleEscape(clientX, clientY) {
                if (yesBtn.disabled) return;
                if (isMoving) return;
                ensureFixedAndSafe();
                moveToRandomSafePosition(clientX, clientY);
            }
            
            // PC鼠标进入
            function onMouseEnter(e) {
                if (yesBtn.disabled) return;
                e.preventDefault();
                handleEscape(e.clientX, e.clientY);
            }
            
            // 移动端触摸开始
            function onTouchStart(e) {
                if (yesBtn.disabled) return;
                e.preventDefault();  // 阻止滚动，让逃跑更跟手
                const touch = e.touches[0];
                if (touch) {
                    handleEscape(touch.clientX, touch.clientY);
                }
            }
            
            // 点击“再考虑考虑”时显示反馈并再次逃跑（确保移动端不会消失）
            function onNoBtnClick(e) {
                if (yesBtn.disabled) return;
                e.stopPropagation();
                responseDiv.textContent = '好吧...我理解你，我会继续努力的!';
                responseDiv.className = 'response show';
                setTimeout(() => {
                    if (responseDiv.className.includes('show') && !yesBtn.disabled) {
                        if (responseDiv.textContent.includes('耐心等你')) {
                            responseDiv.classList.remove('show');
                        }
                    }
                }, 2200);
                
                if (!isMoving) {
                    const rect = noBtn.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    handleEscape(centerX, centerY);
                }
            }
            
            // 愿意按钮逻辑
            function onYesClick() {
                if (yesBtn.disabled) return;
                responseDiv.textContent = '太好了！让我们开一场三角洲吧！';
                responseDiv.className = 'response show';
                createHearts();
                for(let i = 0; i < 6; i++) {
                    setTimeout(() => createHearts(), i * 150);
                }
                yesBtn.disabled = true;
                noBtn.disabled = true;
                noBtn.style.pointerEvents = 'none';
                noBtn.style.opacity = '0.6';
                noBtn.style.filter = 'grayscale(0.1)';
            }
            
            // 窗口尺寸变化时，强力修正按钮位置（移动端旋转屏幕尤其重要）
            function onResize() {
                if (yesBtn.disabled) return;
                if (noBtn.style.position === 'fixed') {
                    enforceButtonInViewport();
                } else {
                    // 如果还没变成fixed，但是窗口变化后，确保不会超出原容器（但一般无影响）
                }
                // 额外保险：重新生成爱心适应新尺寸
                createHearts();
            }
            
            // 滚动保险（极少情况，但加上）
            function onScroll() {
                if (noBtn.style.position === 'fixed' && !yesBtn.disabled) {
                    enforceButtonInViewport();
                }
            }
            
            // 定期巡检（移动端每1.2秒检查一次，确保永不消失）
            let intervalId = null;
            function startSafetyCheck() {
                if (intervalId) clearInterval(intervalId);
                intervalId = setInterval(() => {
                    if (!yesBtn.disabled && noBtn.style.position === 'fixed') {
                        enforceButtonInViewport();
                    }
                }, 1200);
            }
            
            function init() {
                createHearts();
                
                // 事件绑定
                noBtn.addEventListener('mouseenter', onMouseEnter);
                noBtn.addEventListener('touchstart', onTouchStart, { passive: false });
                noBtn.addEventListener('click', onNoBtnClick);
                yesBtn.addEventListener('click', onYesClick);
                
                window.addEventListener('resize', onResize);
                window.addEventListener('orientationchange', () => {
                    setTimeout(onResize, 50);
                });
                window.addEventListener('scroll', onScroll);
                
                // 启动安全巡检
                startSafetyCheck();
                
                // 初始确保按钮安全（如果已经fixed？不会，但以防万一）
                setTimeout(() => {
                    if (noBtn.style.position === 'fixed') enforceButtonInViewport();
                }, 100);
            }
            
            init();
        })();
    </script>
</body>
</html>
